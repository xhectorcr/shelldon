<div id="launch-modal" class="hidden">
    <div class="modal-box">
      <div class="modal-head">
        <span id="modal-icon" class="modal-icon-big"></span>
        <div>
          <div id="modal-title" class="modal-title"></div>
          <div id="modal-desc" class="modal-subtitle"></div>
        </div>
      </div>
      <div id="modal-panes"></div>
      <div class="modal-term">
        <span>⌨</span>
        <span>Terminal:</span>
        <span id="modal-terminal" class="term-tag"></span>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeLaunchModal()">Cancelar</button>
        <button id="btn-confirm" class="btn-primary" onclick="confirmLaunch()">🚀 Lanzar</button>
      </div>
    </div>
  </div>
